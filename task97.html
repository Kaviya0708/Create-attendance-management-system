<!DOCTYPE html>
<html>
<head>
    <title>Attendance Management System</title>

    <style>
        body{
            font-family: Arial;
            padding:20px;
        }

        input, button{
            padding:10px;
            margin:5px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th, td{
            border:1px solid #000;
            padding:10px;
            text-align:center;
        }
    </style>
</head>

<body>

<h2>Attendance Management System</h2>

<input
type="text"
id="name"
placeholder="Student Name">

<button onclick="addStudent()">
Add Student
</button>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="studentTable"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
